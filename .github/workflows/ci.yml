name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write
  issues: write
  pull-requests: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Verify app
        run: npm run verify

  deploy-preview:
    name: Deploy Preview
    needs: verify
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    environment:
      name: preview-pr-${{ github.event.pull_request.number }}
      url: ${{ steps.deploy.outputs.url }}
    env:
      CONVEX_PREVIEW_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Check preview deployment secrets
        run: |
          missing=0
          for name in CONVEX_PREVIEW_DEPLOY_KEY VERCEL_ORG_ID VERCEL_PROJECT_ID VERCEL_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel preview environment
        run: npx vercel pull --yes --environment=preview --token="${VERCEL_TOKEN}"

      - name: Build Vercel preview
        env:
          CONVEX_DEPLOY_KEY: ${{ env.CONVEX_PREVIEW_DEPLOY_KEY }}
        run: npx vercel build --token="${VERCEL_TOKEN}"

      - name: Deploy Vercel preview
        id: deploy
        run: |
          npx vercel deploy --prebuilt --target=preview --token="${VERCEL_TOKEN}" > deployment-url.txt
          cat deployment-url.txt
          url="$(tail -n 1 deployment-url.txt)"
          echo "url=${url}" >> "${GITHUB_OUTPUT}"
          echo "### Vercel Preview" >> "${GITHUB_STEP_SUMMARY}"
          echo "${url}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Publish preview link on pull request
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const marker = "<!-- preview-deployment-link -->";
            const body = `${marker}\n## Preview ready\n\n[Open the preview deployment](${process.env.PREVIEW_URL})`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find(
              (comment) => comment.user.type === "Bot" && comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
